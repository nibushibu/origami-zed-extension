id = "origami"
name = "Origami"
version = "0.0.1"
schema_version = 1
authors = ["nibushibu"]
description = "Language support for the Origami expression language (Zed port of the official VS Code extension, https://github.com/WebOrigami/origami-vscode-extension)"
repository = "https://github.com/nibushibu/origami-zed-extension"

[grammars.origami]
# The Tree-sitter grammar lives in its OWN repository. This is how Zed expects
# grammars to be provided: it clones this repo into <extension>/grammars/origami
# at install time, so the grammar source must NOT be committed into this
# extension repo (grammars/ is gitignored here).
#
# `rev` must always be a commit SHA that has actually been pushed to that
# repository. Bump it whenever tree-sitter-origami changes.
repository = "https://github.com/nibushibu/tree-sitter-origami"
rev = "d4e1406e27a70ca1eea665c57726a0b36071e593"

[language_servers.origami-language-server]
name = "Origami Language Server"
languages = ["Origami", "Origami HTML Document", "Origami Markdown Document"]
