id = "origami"
name = "Origami"
version = "0.0.1"
schema_version = 1
authors = ["nibushibu"]
description = "Language support for the Origami expression language (Zed port of the official VS Code extension, https://github.com/WebOrigami/origami-vscode-extension)"
repository = "https://github.com/nibushibu/origami-zed-extension"

[grammars.origami]
# TODO: `rev` must be a real commit SHA of this repo (the one that
# introduced/updated grammars/origami/src) once it's pushed to GitHub.
# For local dev testing before the first push, you can use a `file://` URL
# instead, e.g.:
#   repository = "file:///Users/genki/Sites/origami-zed-extension"
#   rev = "<current HEAD commit of this repo>"
repository = "https://github.com/nibushibu/origami-zed-extension"
rev = "TODO"
path = "grammars/origami"

[language_servers.origami-language-server]
name = "Origami Language Server"
languages = ["Origami", "Origami HTML Document", "Origami Markdown Document"]
